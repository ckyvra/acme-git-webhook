<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Status</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; }
  .container { max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  .last-checked { font-size: 0.8rem; color: #8b949e; font-weight: normal; }
  table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 8px; overflow: hidden; }
  th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #30363d; }
  th { background: #1c2128; font-weight: 600; color: #8b949e; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 500; }
  .badge.valid { background: #1b4721; color: #3fb950; }
  .badge.warning { background: #4d3c0a; color: #d29922; }
  .badge.critical { background: #5c1515; color: #f85149; }
  .badge.expired { background: #5c1515; color: #f85149; }
  .badge.unknown { background: #21262d; color: #8b949e; }
  .empty { text-align: center; padding: 48px; color: #8b949e; }
  .error { text-align: center; padding: 48px; color: #f85149; }
  .refresh-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
  .refresh-btn:hover { background: #30363d; }
  .summary { display: flex; gap: 16px; margin-bottom: 16px; }
  .summary-card { background: #161b22; border-radius: 8px; padding: 16px; flex: 1; text-align: center; border: 1px solid #30363d; }
  .summary-card .count { font-size: 1.8rem; font-weight: 700; }
  .summary-card .label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; }
  @media (max-width: 600px) { .summary { flex-direction: column; } }
</style>
</head>
<body>
<div class="container">
  <h1>
    Certificate Status
    <button class="refresh-btn" onclick="fetchStatus()">&#x21bb; Refresh</button>
    <span class="last-checked" id="last-checked"></span>
  </h1>
  <div class="summary" id="summary"></div>
  <table>
    <thead>
      <tr>
        <th>Domain</th>
        <th>Expiry</th>
        <th>Days Left</th>
        <th>Status</th>
        <th>Stored At</th>
      </tr>
    </thead>
    <tbody id="certs-body">
      <tr><td colspan="5" class="empty">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
async function fetchStatus() {
  const tbody = document.getElementById("certs-body");
  const summaryDiv = document.getElementById("summary");
  const lastChecked = document.getElementById("last-checked");
  tbody.innerHTML = '<tr><td colspan="5" class="empty">Loading...</td></tr>';

  try {
    const res = await fetch("/certs/status");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const certs = data.certs || [];

    lastChecked.textContent = `Updated: ${new Date().toLocaleTimeString()}`;

    const counts = { valid: 0, warning: 0, critical: 0, expired: 0, unknown: 0 };
    for (const c of certs) {
      const days = c.days_left;
      if (days === null || days === undefined) counts.unknown++;
      else if (days <= 0) counts.expired++;
      else if (days <= 14) counts.critical++;
      else if (days <= 60) counts.warning++;
      else counts.valid++;
    }

    summaryDiv.innerHTML = Object.entries(counts).map(([k, v]) =>
      `<div class="summary-card"><div class="count">${v}</div><div class="label">${k}</div></div>`
    ).join("");

    if (certs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">No certificates found</td></tr>';
      return;
    }

    tbody.innerHTML = certs.map(c => {
      const days = c.days_left;
      let status, badge;
      if (days === null || days === undefined) { status = "unknown"; badge = "unknown"; }
      else if (days <= 0) { status = "expired"; badge = "expired"; }
      else if (days <= 14) { status = "critical"; badge = "critical"; }
      else if (days <= 60) { status = "warning"; badge = "warning"; }
      else { status = "valid"; badge = "valid"; }

      const expiry = c.expiry ? new Date(c.expiry).toLocaleDateString() : "-";
      const stored = c.stored_at ? new Date(c.stored_at).toLocaleDateString() : "-";
      const daysDisplay = days !== null && days !== undefined ? days : "-";

      return `<tr>
        <td><strong>${c.domain}</strong></td>
        <td>${expiry}</td>
        <td>${daysDisplay}</td>
        <td><span class="badge ${badge}">${status}</span></td>
        <td>${stored}</td>
      </tr>`;
    }).join("");

  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="5" class="error">Failed to load: ${err.message}</td></tr>`;
  }
}

fetchStatus();
setInterval(fetchStatus, 60000);
</script>
</body>
</html>
