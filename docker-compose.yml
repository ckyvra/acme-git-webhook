services:
  webhook:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /path/to/deploy_key:/run/secrets/deploy_key:ro
      - /path/to/vault_secret_id:/run/secrets/vault_secret_id:ro
      - webhook_data:/data/acme-git-webhook
    environment:
      - CONFIG_PATH=/app/config.yaml
      # Set a strong random key: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
      - ACME_WEBHOOK_API_KEY=
      - ACME_WEBHOOK_URL=http://localhost:8000

volumes:
  webhook_data:
