name: digestabot

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  digestabot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: chainguard-dev/digestabot@8321f7525e9ad3c4be76fe0c656bedf06f112e5b
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          signoff: true
          labels-for-pr: dependencies
