name: digestabot

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digestabot:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: chainguard-dev/digestabot@43222237fd8a07dc41a06ca13e931c95ce2cedac
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          signoff: true
          labels-for-pr: dependencies
